<div class="login-container page">
  <div class="login-card">
    <!-- Header -->
    <div class="logo-section">
      <div class="logo">
        <img src="assets/logo smartboiler.jpg" alt="Logo SmartBoiler" class="logo-image" />
      </div>
      <h1 class="title">Smart<span class="bold">Boiler</span></h1>
    </div>

    <div class="subtitle" *ngIf="!showReset">Inicio de Sesión - Bienvenido!</div>
    <div class="subtitle" *ngIf="showReset">Restablecer Contraseña</div>

    <!-- Error Message -->
    <div class="error-message" *ngIf="error">
      <span>{{ error }}</span>
    </div>

    <!-- Success Message -->
    <div class="success-message" *ngIf="successMsg">
      <span>{{ successMsg }}</span>
    </div>

    <!-- Login Form -->
    <form *ngIf="!showReset" [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="form">
      <!-- Email Field -->
      <div class="form-group">
        <label class="form-label">Email</label>
        <input
          type="email"
          formControlName="email"
          class="form-input"
          placeholder="ejemplo@email.com"
          [class.input-error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        />
        <small class="error-text" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Email inválido
        </small>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label class="form-label">Clave</label>
        <input
          type="password"
          formControlName="password"
          class="form-input"
          placeholder="••••••••"
          [class.input-error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        />
        <small class="error-text" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Mínimo 6 caracteres
        </small>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn-primary" [disabled]="loading || loginForm.invalid">
        <span *ngIf="!loading">Acceso</span>
        <span *ngIf="loading">Cargando...</span>
      </button>
    </form>

    <!-- Reset Password Form -->
    <form *ngIf="showReset" [formGroup]="resetForm" (ngSubmit)="onReset()" class="form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input
          type="email"
          formControlName="email"
          class="form-input"
          placeholder="ejemplo@email.com"
          [class.input-error]="resetForm.get('email')?.invalid && resetForm.get('email')?.touched"
        />
        <small class="error-text" *ngIf="resetForm.get('email')?.invalid && resetForm.get('email')?.touched">
          Email inválido
        </small>
      </div>

      <div class="form-group">
        <label class="form-label">Nueva Contraseña</label>
        <input
          type="password"
          formControlName="newPassword"
          class="form-input"
          placeholder="••••••••"
          [class.input-error]="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched"
        />
        <small class="error-text" *ngIf="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched">
          Mínimo 6 caracteres
        </small>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading || resetForm.invalid">
        <span *ngIf="!loading">Cambiar Contraseña</span>
        <span *ngIf="loading">Cargando...</span>
      </button>

      <button type="button" class="btn-secondary" (click)="toggleReset()">
        Volver al Login
      </button>
    </form>

    <!-- Divider -->
    <div class="divider" *ngIf="!showReset">
      <span>O accede con</span>
    </div>

    <!-- Social Login Buttons -->
    <div class="social-buttons" *ngIf="!showReset">
      <button class="social-btn twitter" (click)="socialLogin('twitter')" title="Twitter">
        <span>𝕏</span> Twitter
      </button>
      <button class="social-btn facebook" (click)="socialLogin('facebook')" title="Facebook">
        <span>f</span> Facebook
      </button>
    </div>

    <!-- Links -->
    <div class="footer-links">
      <p class="forgot-password" *ngIf="!showReset">
        <a (click)="toggleReset()" class="link-button">¿Olvidó su clave?</a>
      </p>
      <p class="signup-link">
        ¿Aún no tiene cuenta?
        <a (click)="goToSignup()" class="link-button">Crear Cuenta</a>
      </p>
    </div>
  </div>
</div>
