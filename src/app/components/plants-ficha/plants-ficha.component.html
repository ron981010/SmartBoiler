<div class="plants-ficha-container page">
  <!-- Header -->
  <div class="ficha-header" *ngIf="!isLoadingData && !isCreating && !isEditing && !isViewing">
    <h1>Ficha de plantas</h1>
  </div>

  <!-- Loading State -->
  <div class="loading" *ngIf="isLoadingData">
    <p>Cargando información...</p>
  </div>

  <!-- Error Message -->
  <div class="error-message" *ngIf="error">
    <p>{{ error }}</p>
  </div>

  <!-- Plants Grid View -->
  <div class="plants-grid-view" *ngIf="!isLoadingData && !isCreating && !isEditing && !isViewing && plants.length > 0">
    <div class="plants-grid">
      <!-- Plant Cards -->
      <div class="plant-card" *ngFor="let plant of plants" (click)="viewPlant(plant)">
        <div class="plant-card-icon">
          <img src="assets/planta icon.jpg" alt="Plant Icon" class="icon-image"/>
        </div>
        <p class="plant-card-name">{{ plant.nombre }}</p>
      </div>

      <!-- Add Plant Card -->
      <div class="plant-card add-card" (click)="createNewPlant()">
        <div class="plant-card-icon add-icon">
          <svg viewBox="0 0 24 24" fill="white">
            <line x1="12" y1="5" x2="12" y2="19" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <line x1="5" y1="12" x2="19" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <p class="plant-card-label">Agregar</p>
      </div>
    </div>
    <div class="bottom-nav-actions">
      <button class="bottom-back-btn" (click)="goBack()">← Atrás</button>
    </div>
  </div>

  <!-- Form View -->
  <form [formGroup]="form" class="plant-form" *ngIf="!isLoadingData && (isCreating || isEditing || isViewing)">
    <div class="form-header form-header-step1">
      <div class="header-titles">
        <h2>Ficha de plantas</h2>
        <p class="plant-header-name" *ngIf="selectedPlant?.nombre">{{ selectedPlant?.nombre }}</p>
      </div>
      <button
        type="button"
        class="edit-icon-btn"
        *ngIf="!isEditing && isViewing"
        (click)="editPlant()"
        title="Editar planta"
      >
        <img src="assets/edit button.jpg" alt="Editar" class="edit-icon"/>
      </button>
      <button
        type="button"
        class="header-cancel-btn"
        *ngIf="isEditing && !!selectedPlant"
        (click)="cancelEdit()"
      >
        Cancelar
      </button>
    </div>

    <!-- Nombre -->
    <div class="form-section">
      <label>Nombre de planta <span class="required">*</span></label>
      <input type="text" formControlName="nombre" placeholder="Ej: Planta 1" />
    </div>

    <!-- Dirección -->
    <div class="form-section">
      <label>Dirección <span class="required">*</span></label>
      <p class="label-subtitle">Tipo y número</p>
      <div class="address-row">
        <select formControlName="avenue" class="avenue-select">
          <option value="">Tipo...</option>
          <option value="Av.">Av.</option>
          <option value="Calle">Calle</option>
          <option value="Jr.">Jr.</option>
          <option value="Psj.">Psj.</option>
          <option value="Pza.">Pza.</option>
          <option value="Mz.">Mz.</option>
        </select>
        <input type="text" formControlName="avenue_number" placeholder="Número" class="avenue-number" />
      </div>
    </div>

    <!-- Distrito -->
    <div class="form-section">
      <label>Distrito <span class="required">*</span></label>
      <input type="text" formControlName="district" placeholder="Ej: San Juan de Miraflores" />
    </div>

    <!-- Departamento y Provincia -->
    <div class="form-row">
      <div class="form-section">
        <label>Departamento <span class="required">*</span></label>
        <select formControlName="department" class="department-select">
          <option *ngFor="let dept of departments" [value]="dept">
            {{ dept }}
          </option>
        </select>
      </div>
      <div class="form-section">
        <label>Provincia <span class="required">*</span></label>
        <select formControlName="province" class="province-select">
          <option *ngFor="let prov of filteredProvinces" [value]="prov">
            {{ prov }}
          </option>
        </select>
      </div>
    </div>

    <!-- Contacto -->
    <div class="form-section">
      <label>Contacto</label>
      <input type="text" formControlName="correo" placeholder="Nombre del encargado" />
    </div>

    <!-- Email -->
    <div class="form-section">
      <label>Email</label>
      <input type="email" formControlName="email" placeholder="Ej: gerente@planta.com" />
    </div>

    <!-- Imagen -->
    <div class="form-section">
      <label>Imagen de planta</label>
      <div class="image-upload-container">
        <!-- Image Preview -->
        <div class="image-preview" *ngIf="imagePreview">
          <img [src]="imagePreview" alt="Plant image preview" />
          <button 
            type="button" 
            class="clear-image-btn" 
            (click)="deleteImage()"
            [disabled]="loading"
            *ngIf="isCreating || isEditing"
          >
            ✕ Eliminar imagen
          </button>
        </div>

        <!-- Upload placeholder -->
        <div class="image-placeholder" *ngIf="!imagePreview && (isCreating || isEditing)">
          <label class="image-upload-label">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
            </svg>
            <span>Selecciona una imagen</span>
            <input 
              type="file" 
              accept="image/*" 
              (change)="onImageSelected($event)"
              class="image-input"
            />
          </label>
        </div>

        <div class="image-placeholder" *ngIf="!imagePreview && isViewing && !isEditing">
          <span>Sin imagen</span>
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="form-actions">
      <button type="button" class="back-btn-action" (click)="isViewing && !isEditing ? backToList() : cancelEdit()">
        ← Atrás
      </button>
      <button class="delete-plant-btn" (click)="deletePlant()" [disabled]="loading" type="button" *ngIf="selectedPlant && isViewing && !isEditing">
        🗑️ Eliminar planta
      </button>
      <button 
        type="button" 
        class="save-btn" 
        (click)="onSave()" 
        [disabled]="loading || form.invalid"
        [class.loading]="loading"
        *ngIf="isCreating || isEditing"
      >
        <span *ngIf="!loading">💾 {{ isCreating ? 'Guardar' : 'Guardar cambios' }}</span>
        <span *ngIf="loading">Guardando...</span>
      </button>
    </div>
  </form>

  <!-- Empty State with Add Button -->
  <div class="empty-grid-view" *ngIf="!isLoadingData && !isCreating && !isEditing && !isViewing && plants.length === 0">
    <div class="plants-grid">
      <!-- Add First Plant Card -->
      <div class="plant-card add-card" (click)="createNewPlant()">
        <div class="plant-card-icon add-icon">
          <svg viewBox="0 0 24 24" fill="white">
            <line x1="12" y1="5" x2="12" y2="19" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <line x1="5" y1="12" x2="19" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <p class="plant-card-label">Agregar</p>
      </div>
    </div>
    <div class="bottom-nav-actions">
      <button class="bottom-back-btn" (click)="goBack()">← Atrás</button>
    </div>
  </div>
</div>
