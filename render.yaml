services:
  - type: web
    name: enerapp
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build && npm run seed:render
    startCommand: npm run start:render
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
    disk:
      name: enerapp-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
